<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- ВАЖНО: для телефонов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>📖 Книга рассказов с музыкой ✦ CryptoCat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a3a2a, #0e2b1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
        }
        /* Адаптивная книга */
        .book {
            max-width: 100%;
            width: 100%;
            background: #fcf3e0;
            background-image: radial-gradient(circle at 30% 40%, #fff7e8, #ecdbba);
            border-radius: 45px 20px 20px 45px;
            padding: 20px 15px 20px 30px;
            box-shadow: 
                0 20px 35px rgba(0,0,0,0.6),
                0 0 0 12px #b48b5a,
                0 0 0 18px #6f4e2e,
                inset 0 0 15px #ffe4bc;
            border: 4px solid #e5cfb0;
            position: relative;
        }
        .book:before {
            content: '';
            position: absolute;
            left: 12px;
            top: 35px;
            bottom: 35px;
            width: 7px;
            background: linear-gradient(135deg, #8b6c47, #b48b5a, #6f4e2e);
            border-radius: 20px;
            box-shadow: inset -2px 0 5px #3b2e1e;
        }
        h1 {
            font-size: clamp(30px, 7vw, 60px);
            color: #2b3a1f;
            text-align: center;
            margin-left: 15px;
            text-shadow: 3px 3px 0 #c9a87c, 5px 5px 0 #7a6234;
            letter-spacing: 1px;
            font-weight: 900;
            transform: rotate(-0.3deg);
            word-break: break-word;
        }
        .toc {
            background: #e8d9c0;
            border: 4px solid #9e8463;
            border-radius: 50px 20px 20px 50px;
            padding: 20px 15px 20px 30px;
            margin: 25px 0 25px 10px;
            box-shadow: inset 0 0 0 3px #fdefd4, 0 10px 0 #6f523b;
        }
        .toc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .story-btn {
            background: #487a4f;
            color: white;
            font-size: 22px;
            padding: 15px 20px;
            border: none;
            border-radius: 60px 20px 20px 60px;
            border: 4px solid #ffd98c;
            font-weight: bold;
            box-shadow: 6px 6px 0 #1f3f22;
            cursor: pointer;
            transition: 0.05s linear;
            flex: 1 1 200px;
            text-shadow: 2px 2px 0 #1f3f22;
        }
        .story-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 2px 2px 0 #1f3f22;
        }
        .viewer {
            background: #fffcf2;
            border: 5px solid #d4b185;
            border-radius: 60px 15px 15px 60px;
            padding: 25px 20px 25px 35px;
            margin-left: 10px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 0 4px #ffeac6, 0 12px 0 #8d6b44;
        }
        .story-title {
            font-size: clamp(28px, 6vw, 48px);
            color: #295229;
            border-left: 12px solid #5f9e6b;
            padding-left: 18px;
            margin-bottom: 15px;
            font-weight: 800;
            word-break: break-word;
        }
        .story-text {
            font-size: 22px;
            line-height: 1.5;
            color: #1f2f0f;
            white-space: pre-wrap;
            background: #fff9e6;
            padding: 20px;
            border-radius: 35px;
            border: 3px solid #b5956b;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .audio-block {
            background: #e9dcc7;
            border-radius: 70px;
            padding: 12px 18px;
            border: 4px solid #936e42;
            box-shadow: inset 0 0 0 3px #fff2cf, 0 6px 0 #624a30;
            margin: 20px 0 10px;
        }
        .audio-title {
            font-size: 26px;
            color: #364d36;
            margin-bottom: 8px;
            padding-left: 15px;
            font-weight: 600;
        }
        audio {
            width: 100%;
            height: 54px;
            border-radius: 50px;
            outline: none;
            background: #ffe6b0;
        }
        audio::-webkit-media-controls-panel {
            background: #ffd78c;
        }
        .nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-left: 10px;
        }
        .nav-btn {
            background: #d1975a;
            font-size: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 60px;
            border: 5px solid #ffdd9e;
            font-weight: bold;
            box-shadow: 7px 7px 0 #734f2c;
            cursor: pointer;
            transition: 0.05s;
            color: #1a1a1a;
        }
        .nav-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 2px 2px 0 #734f2c;
        }
        .footer {
            text-align: center;
            font-size: 26px;
            margin-top: 30px;
            margin-left: 10px;
            color: #fef7d6;
            background: #3e6941;
            padding: 15px;
            border-radius: 80px;
            border: 4px solid #ffd58c;
            box-shadow: 0 7px 0 #2a412a;
            word-break: break-word;
        }
        /* мобильная подстройка */
        @media (max-width: 450px) {
            .story-text {
                font-size: 20px;
            }
            .nav-btn {
                font-size: 24px;
                padding: 10px 18px;
            }
            .footer {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="book">
    <h1>🎵 КНИГА ЗВУКОВ CRYPTOCAT</h1>

    <!-- ОГЛАВЛЕНИЕ -->
    <div class="toc">
        <div class="toc-grid" id="tocGrid"></div>
    </div>

    <!-- ПРОСМОТР -->
    <div class="viewer" id="viewer">
        <div class="story-title" id="viewTitle">🐱 Рассказ</div>
        <div class="story-text" id="viewText">текст появится здесь</div>
        
        <!-- БЛОК АУДИО (будет заполняться) -->
        <div id="audioContainer"></div>
    </div>

    <!-- КНОПКИ -->
    <div class="nav">
        <button class="nav-btn" id="prevBtn">◀ НАЗАД</button>
        <button class="nav-btn" id="nextBtn">ВПЕРЁД ▶</button>
    </div>

    <div class="footer">
        🔊 нажми на название рассказа — и слушай
    </div>
</div>

<script>
(function() {
    // 📚 МАССИВ С РАССКАЗАМИ И ССЫЛКАМИ НА АУДИО
    let stories = [
        {
            title: "📖 МАЛЬЧИК, КОТОРЫЙ НЕ БОЯЛСЯ РЖАВЧИНЫ",
            text: "В одном городе, где дома были высокими, а небо — узким, жил мальчик по имени Тим. Ему было 5 лет, и он очень любил гулять с дедушкой.\n\nДедушка был старый, но руки у него были золотые. Он мог починить всё: часы, стул, даже сломанный зонтик.\n\nОднажды они пошли гулять и зашли в странное место — там, где никто не ходил. Там пахло пылью, а вокруг лежали старые железки, колёса, провода и даже одна дверь без дома.\n\n— Дедушка, что это? — спросил Тим.\n— Это свалка, — ответил дед. — Но я называю её «кладовка».\n— А почему?\n— Потому что здесь лежит то, что может стать чем-то новым.\n\nТим посмотрел на ржавое колесо и спросил:\n— А это может стать новым?\n— Может, — улыбнулся дед. — Если не бояться.\n\nИ они взяли колесо домой. Дед достал инструменты, и они вместе почистили, покрасили, прикрутили… И получилась… машинка! Маленькая, но самая настоящая. Тим катал её по полу и смеялся.\n\nС тех пор каждые выходные они ходили в «кладовку». И каждый раз находили что-то, что можно было починить. Однажды — сломанный стул. В другой раз — лампу без света. А один раз — даже старый будильник, который зазвонил через неделю.\n\nТим перестал бояться:\n- грязи\n- ржавчины\n- того, что сломалось\n\nОн понял: если не бояться и попробовать починить — может получиться что-то классное.",
            audioUrl: "https://files.catbox.moe/zrx7wn.mp4"
        },
        {
            title: "🌊 Шум моря",
            text: "Волны накатывают на берег. Слышен крик чаек.",
            audioUrl: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/Creative_Commons/Scott_Holmes/Music_For_Media/Scott_Holmes_-_01_-_Creek_Walk.mp3"
        },
        {
            title: "☔️ Дождь",
            text: "Капли стучат по крыше. Тепло и уютно.",
            audioUrl: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/Creative_Comments/Kai_Engel/Satin/Kai_Engel_-_01_-_Satin.mp3"
        }
    ];

    let currentIdx = 0;

    function renderToc() {
        const toc = document.getElementById('tocGrid');
        toc.innerHTML = '';
        stories.forEach((s, i) => {
            const btn = document.createElement('button');
            btn.className = 'story-btn';
            btn.innerText = s.title;
            btn.onclick = () => {
                currentIdx = i;
                displayStory();
            };
            toc.appendChild(btn);
        });
    }

    function displayStory() {
        if (!stories.length) return;
        const s = stories[currentIdx];
        document.getElementById('viewTitle').innerText = s.title;
        document.getElementById('viewText').innerText = s.text;

        const audioContainer = document.getElementById('audioContainer');
        audioContainer.innerHTML = '';

        if (s.audioUrl) {
            audioContainer.innerHTML = `
                <div class="audio-block">
                    <div class="audio-title">🎤 слушать</div>
                    <audio controls src="${s.audioUrl}">⚠️ аудио не поддерживается</audio>
                </div>
            `;
        } else {
            audioContainer.innerHTML = '';
        }
    }

    document.getElementById('prevBtn').onclick = () => {
        if (stories.length === 0) return;
        currentIdx = (currentIdx - 1 + stories.length) % stories.length;
        displayStory();
    };
    document.getElementById('nextBtn').onclick = () => {
        if (stories.length === 0) return;
        currentIdx = (currentIdx + 1) % stories.length;
        displayStory();
    };

    renderToc();
    displayStory();
})();
</script>
</body>
</html>
