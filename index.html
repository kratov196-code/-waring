<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>📖 Книга рассказов CryptoCat ромы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1f4f2b;
            display: flex;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .book {
            max-width: 1300px;
            width: 100%;
            background: #fcf5e6;
            border-radius: 40px 20px 20px 40px;
            padding: 30px 20px 30px 40px;
            box-shadow: 0 0 0 15px #ad8b67, 0 20px 30px black;
            border: 5px solid #e5c9a7;
            position: relative;
        }
        .book:before {
            content: '';
            position: absolute;
            left: 15px;
            top: 35px;
            bottom: 35px;
            width: 10px;
            background: #ad8b67;
            border-radius: 20px;
        }
        h1 {
            font-size: 70px;
            text-align: center;
            color: #342215;
            text-shadow: 4px 4px 0 #b5926a;
            margin-left: 20px;
        }
        .toc {
            background: #e3cfb3;
            padding: 25px;
            border-radius: 50px 15px 15px 50px;
            margin: 30px 0 30px 20px;
            border: 4px solid #6f523b;
        }
        .toc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .story-btn {
            background: #427a4b;
            color: white;
            font-size: 24px;
            padding: 15px 20px;
            border-radius: 60px 20px 20px 60px;
            border: 4px solid #ffd58c;
            font-weight: bold;
            box-shadow: 6px 6px 0 #1f3a22;
            cursor: pointer;
            transition: 0.05s;
            flex: 1 1 200px;
        }
        .story-btn:active {
            transform: translate(4px,4px);
            box-shadow: 2px 2px 0 #1f3a22;
        }
        .viewer {
            background: #fffef6;
            border: 5px solid #be9f7b;
            border-radius: 70px 20px 20px 70px;
            padding: 30px;
            margin-left: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 0 3px #ffe3b0, 0 10px 0 #876e4f;
        }
        .story-title {
            font-size: 48px;
            color: #255025;
            border-bottom: 4px dotted #8fbb8f;
        }
        .story-text {
            font-size: 28px;
            line-height: 1.5;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        .story-img {
            max-width: 80%;
            max-height: 400px;
            border: 8px solid #ffd78c;
            border-radius: 50px;
            box-shadow: 10px 10px 0 #6a4e32;
            display: block;
        }
        .nav {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .nav-btn {
            background: #d18f57;
            font-size: 35px;
            padding: 15px 30px;
            border-radius: 80px;
            border: 5px solid #ffe2af;
            font-weight: bold;
            box-shadow: 7px 7px 0 #784f2e;
            cursor: pointer;
        }
        .nav-btn:active {
            transform: translate(5px,5px);
            box-shadow: 2px 2px 0 #784f2e;
        }
        .admin {
            background: #4d7352;
            padding: 30px;
            border-radius: 70px 20px 20px 70px;
            margin-left: 20px;
        }
        .admin input, .admin textarea {
            width: 100%;
            font-size: 26px;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #3f5e3f;
            margin-bottom: 15px;
        }
        .admin textarea {
            min-height: 150px;
        }
        .file-label {
            background: #faa75e;
            display: inline-block;
            font-size: 30px;
            padding: 15px 30px;
            border-radius: 60px;
            border: 5px solid #ffeeaa;
            font-weight: bold;
            box-shadow: 5px 5px 0 #8f5e31;
            cursor: pointer;
        }
        #fileInput {
            display: none;
        }
        .add-btn {
            background: #ffb042;
            font-size: 40px;
            padding: 20px;
            border-radius: 80px;
            border: 5px solid #ffffaa;
            width: 100%;
            font-weight: bold;
            box-shadow: 7px 7px 0 #a56a2c;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="book" id="book">
    <h1>🐱 КНИГА CRYPTOCAT</h1>

    <!-- ОГЛАВЛЕНИЕ -->
    <div class="toc">
        <div class="toc-grid" id="tocGrid"></div>
    </div>

    <!-- ПРОСМОТР -->
    <div class="viewer" id="viewer">
        <div class="story-title" id="viewTitle"></div>
        <div class="story-text" id="viewText"></div>
        <img id="viewImage" class="story-img" style="display:none;">
    </div>

    <!-- КНОПКИ НАВИГАЦИИ -->
    <div class="nav">
        <button class="nav-btn" id="prevBtn">◀ НАЗАД</button>
        <button class="nav-btn" id="nextBtn">ВПЕРЁД ▶</button>
    </div>

    <!-- АДМИНКА -->
    
</div>

<script>
(function() {
    let stories = JSON.parse(localStorage.getItem('crypto_stories')) || [
        { title: "📖 МАЛЬЧИК, КОТОРЫЙ НЕ БОЯЛСЯ РЖАВЧИНЫ", text: "В одном городе, где дома были высокими, а небо — узким, жил мальчик по имени Тим. Ему было 5 лет, и он очень любил гулять с дедушкой.

Дедушка был старый, но руки у него были золотые. Он мог починить всё: часы, стул, даже сломанный зонтик.

Однажды они пошли гулять и зашли в странное место — там, где никто не ходил. Там пахло пылью, а вокруг лежали старые железки, колёса, провода и даже одна дверь без дома.

— Дедушка, что это? — спросил Тим.
— Это свалка, — ответил дед. — Но я называю её «кладовка».
— А почему?
— Потому что здесь лежит то, что может стать чем-то новым.

Тим посмотрел на ржавое колесо и спросил:
— А это может стать новым?
— Может, — улыбнулся дед. — Если не бояться.

И они взяли колесо домой. Дед достал инструменты, и они вместе почистили, покрасили, прикрутили… И получилась… машинка! Маленькая, но самая настоящая. Тим катал её по полу и смеялся.

С тех пор каждые выходные они ходили в «кладовку». И каждый раз находили что-то, что можно было починить. Однажды — сломанный стул. В другой раз — лампу без света. А один раз — даже старый будильник, который зазвонил через неделю.

Тим перестал бояться:

грязи

ржавчины

того, что сломалось

Он понял: если не бояться и попробовать починить — может получиться что-то классное.

", image: "" },
        { title: "☁️ Мечта", text: "Облако было похоже на хламолёт.", image: "" },
            { title: "☁️ Мечта", text: "Облако было похоже на хламолёт.", image: "" },
            { title: "☁️ Мечта", text: "Облако было похоже на хламолёт.", image: "" }
    ];

    let currentIdx = 0;
    let pendingBase64 = "";

    function renderToc() {
        let toc = document.getElementById('tocGrid');
        toc.innerHTML = "";
        stories.forEach((s, i) => {
            let btn = document.createElement('button');
            btn.className = "story-btn";
            btn.innerText = s.title.length > 25 ? s.title.slice(0,22)+"…" : s.title;
            btn.onclick = () => { currentIdx = i; displayStory(); };
            toc.appendChild(btn);
        });
    }

    function displayStory() {
        if (!stories.length) return;
        let s = stories[currentIdx];
        document.getElementById('viewTitle').innerText = s.title;
        document.getElementById('viewText').innerText = s.text;
        let img = document.getElementById('viewImage');
        if (s.image && s.image.startsWith('data:image')) {
            img.src = s.image;
            img.style.display = 'block';
        } else {
            img.style.display = 'none';
        }
    }

    function saveStories() {
        localStorage.setItem('crypto_stories', JSON.stringify(stories));
        renderToc();
        displayStory();
    }

    document.getElementById('prevBtn').onclick = () => {
        if (!stories.length) return;
        currentIdx = (currentIdx - 1 + stories.length) % stories.length;
        displayStory();
    };
    document.getElementById('nextBtn').onclick = () => {
        if (!stories.length) return;
        currentIdx = (currentIdx + 1) % stories.length;
        displayStory();
    };

    document.getElementById('fileInput').onchange = function(e) {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(ev) {
            pendingBase64 = ev.target.result;
            document.getElementById('base64preview').innerHTML = "✅ Фото готово (base64)";
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('addStoryBtn').onclick = function() {
        let title = document.getElementById('storyTitleInput').value.trim();
        let text = document.getElementById('storyTextInput').value.trim();
        if (!title || !text) { alert("Введи название и текст"); return; }

        let newStory = { title, text, image: pendingBase64 || "" };
        stories.push(newStory);
        saveStories();

        document.getElementById('storyTitleInput').value = "";
        document.getElementById('storyTextInput').value = "";
        pendingBase64 = "";
        document.getElementById('base64preview').innerHTML = "Фото будет внутри файла";
        currentIdx = stories.length - 1;
        displayStory();
    };

    renderToc();
    displayStory();
})();
</script>
</body>
</html>
